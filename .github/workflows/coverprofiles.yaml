---
name: "Coverprofiles"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "tests/**"
      - "README.md"
      - "hack/coverprofile.sh"

jobs:
  generate-reports:
    uses: heathcliff26/ci/.github/workflows/testcover-report.yaml@main
    secrets: inherit
    permissions:
      contents: read
    with:
      coverprofile: "target/coverage/lcov.info"
