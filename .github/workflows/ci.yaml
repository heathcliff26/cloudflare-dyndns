---
name: CI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Use to set tag, default: rolling"
        type: string
        default: "rolling"
        required: false
      dry-run:
        description: "Do not push image"
        type: boolean
        default: false
        required: false
      latest:
        description: "Tag latest"
        type: boolean
        default: false
        required: false
  workflow_call:
    inputs:
      tag:
        description: "Use to set tag, default: rolling"
        type: string
        default: "rolling"
        required: false
      dry-run:
        description: "Do not push image"
        type: boolean
        default: false
        required: false
      latest:
        description: "Tag latest"
        type: boolean
        default: false
        required: false
  push:
    branches: ["main"]
    paths:
      - "go.mod"
      - "go.sum"
      - "*.go"
      - "**/*.go"
      - "Dockerfile"
  pull_request:
    branches: ["main"]
  merge_group:
    branches: ["main"]

jobs:
  lint:
    uses: heathcliff26/ci/.github/workflows/golang-lint.yaml@main
    permissions:
      contents: read

  gosec:
    uses: heathcliff26/ci/.github/workflows/golang-gosec.yaml@main
    permissions:
      contents: read
      security-events: write

  unit-tests:
    uses: heathcliff26/ci/.github/workflows/golang-unit-tests.yaml@main
    permissions:
      contents: read
    with:
      coveralls: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

  validate:
    uses: heathcliff26/ci/.github/workflows/golang-build.yaml@main
    permissions:
      contents: read
    with:
      cache: false
      cmd: "make validate"

  build-binary:
    uses: heathcliff26/ci/.github/workflows/golang-build.yaml@main
    needs:
      - lint
      - unit-tests
    permissions:
      contents: read
    with:
      release: "${{ github.event_name == 'pull_request' && 'devel' || inputs.tag == '' && 'rolling' || inputs.tag }}"
      artifact: "bin/cloudflare-dyndns-*"
      artifact-name: "cloudflare-dyndns"
      cmd: "make build-all"
    secrets: inherit

  build-image:
    uses: heathcliff26/ci/.github/workflows/build-container.yaml@main
    needs:
      - lint
      - unit-tests
      - validate
      - gosec
    permissions:
      contents: read
      packages: write
    with:
      dockerfile: Dockerfile
      tag: "${{ inputs.tag == '' && 'rolling' || inputs.tag }}"
      tags: "${{ inputs.latest == true && 'type=raw,value=latest' || '' }}"
      dry-run: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' || inputs.dry-run == 'true' }}
    secrets: inherit

  build-packages:
    uses: heathcliff26/ci/.github/workflows/golang-build.yaml@main
    needs:
      - lint
      - unit-tests
    permissions:
      contents: read
    with:
      release: "${{ github.event_name == 'pull_request' && 'devel' || inputs.tag == '' && 'rolling' || inputs.tag }}"
      goos: "linux"
      artifact: "bin/cloudflare-dyndns_*.ipk"
      artifact-name: "cloudflare-dyndns-openwrt"
      cmd: "make package-openwrt-opkg"
    secrets: inherit

  prepare-apk-build:
    name: Prepare APK build
    runs-on: ubuntu-latest
    outputs:
      abuild-rsa: ${{ steps.set-abuild-rsa.outputs.abuild-rsa }}
    steps:
      - name: Set ABUILD_RSA
        id: set-abuild-rsa
        run: |
          echo "abuild-rsa<<EOF" >> "$GITHUB_OUTPUT"
          echo "${{ secrets.ABUILD_RSA }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  build-packages-apk:
    uses: heathcliff26/ci/.github/workflows/golang-build.yaml@main
    needs:
      - lint
      - unit-tests
      - prepare-apk-build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
          - arch: arm64
    with:
      release: "${{ github.event_name == 'pull_request' && 'devel' || inputs.tag == '' && 'rolling' || inputs.tag }}"
      goos: "linux"
      artifact: "bin/cloudflare-dyndns_*.apk"
      artifact-name: "cloudflare-dyndns-openwrt-apk-${{ matrix.arch }}"
      cmd: |
        echo "${{ needs.prepare-apk-build.outputs.abuild-rsa }}" > packages/openwrt-apk/abuild.rsa
        make package-openwrt-apk
      architecture: "${{ matrix.arch }}"
    secrets: inherit

  push-helm:
    uses: heathcliff26/ci/.github/workflows/push-helm-chart.yaml@main
    if: ${{ inputs.tag != '' && inputs.tag != 'rolling' }}
    needs:
      - lint
      - unit-tests
      - validate
      - gosec
    permissions:
      contents: read
      packages: write
    with:
      tag: "${{ inputs.tag }}"
      dry-run: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' || inputs.dry-run == 'true' }}
    secrets: inherit
